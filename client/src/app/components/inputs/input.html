@if (props.mode === 'textarea') {
  <app-textarea [props]="props" />
} @else if (props.mode === 'select') {
  <app-select
    [props]="{
		...props,
		items: props.items!
	}"
  />
} @else if (props.mode === 'file') {
  <app-file-field [props]="props" />
} @else {
  <app-text-field [props]="props" />
}
<tui-error [formControl]="props.control" [error]="[] | tuiFieldError | async" />
